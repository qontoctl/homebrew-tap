name: Update Formula

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-formula:
    name: Update formula
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch latest version from npm
        run: |
          VERSION=$(curl -fsSL https://registry.npmjs.org/qontoctl/latest | jq -r '.version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not determine latest version from npm"
            exit 1
          fi
          echo "Latest version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check if update needed
        id: check
        run: |
          CURRENT=$(sed -n 's/.*qontoctl-\([0-9][0-9.]*[0-9]\)\.tgz.*/\1/p' Formula/qontoctl.rb)
          echo "Current formula version: $CURRENT"
          echo "Latest npm version: $VERSION"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Formula already up to date"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: $CURRENT -> $VERSION"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download tarball and compute SHA256
        if: steps.check.outputs.needed == 'true'
        run: |
          TARBALL_URL="https://registry.npmjs.org/qontoctl/-/qontoctl-${VERSION}.tgz"
          echo "Downloading $TARBALL_URL"
          curl -fsSL -o qontoctl.tgz "$TARBALL_URL"
          SHA256=$(sha256sum qontoctl.tgz | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "TARBALL_URL=$TARBALL_URL" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Update formula
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s|url \".*\"|url \"$TARBALL_URL\"|" Formula/qontoctl.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" Formula/qontoctl.rb
          echo "Updated formula:"
          cat Formula/qontoctl.rb

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/qontoctl.rb
          git commit -m "Update qontoctl to ${VERSION}"
          git push
